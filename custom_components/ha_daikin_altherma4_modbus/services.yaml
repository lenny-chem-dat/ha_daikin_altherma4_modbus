set_smart_grid_mode:
  name: Set Smart Grid mode
  description: Set the Smart Grid operation mode for energy management.
  target:
    entity:
      integration: ha_daikin_altherma4_modbus
      domain: select
  fields:
    config_entry_id:
      name: Config entry
      description: The config entry ID of the Daikin Altherma 4 heat pump.
      example: "abc123def456"
      required: true
      selector:
        text:
    smart_grid_mode:
      name: Smart Grid mode
      description: The Smart Grid mode to set.
      required: true
      selector:
        select:
          options:
            - "free running"
            - "forced off"
            - "recommended on"
            - "forced on"
