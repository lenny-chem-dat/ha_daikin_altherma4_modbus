name: HACS + hassfest Validation

on:
  push:
  pull_request:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  # --- HACS Validation ---
  validate_hacs:
    name: Validate HACS Repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate HACS integration
        uses: hacs/action@main
        with:
          category: integration

  # --- hassfest Validation ---
  hassfest:
    name: Run hassfest Checks
    runs-on: ubuntu-latest
    needs: validate_hacs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master
