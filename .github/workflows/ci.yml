name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Add permissions for creating releases and coverage reporting
permissions:
  contents: write
  checks: write

jobs:
  validate:
    name: Validate (ha-${{ matrix.ha-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ha-version: ["stable", "beta"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # 🔢 Extract version from manifest.json
      - name: Get manifest version
        id: manifest
        run: |
          VERSION=$(jq -r '.version' custom_components/ha_daikin_altherma4_modbus/manifest.json)
          echo "manifest_version=$VERSION" >> $GITHUB_OUTPUT

      # 🔢 Compare tag with manifest version
      - name: Ensure tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$TAG_VERSION" != "${{ steps.manifest.outputs.manifest_version }}" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest version (${{ steps.manifest.outputs.manifest_version }})"
            exit 1
          fi

      # 🧪 Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 🔍 Code Quality Checks
      - name: Run Ruff linting
        run: ruff check .

      - name: Run Ruff formatting check
        run: ruff format --check .

      - name: Run Ruff import sorting check
        run: ruff check --select I .

      # 🧪 Enhanced Pytest Steps
      - name: Run unit tests
        run: |
          pytest --cov=custom_components/ha_daikin_altherma4_modbus --cov-report=xml --cov-report=term-missing --cov-report=html --junit-xml=test-results-unit.xml

      - name: Run integration tests
        run: |
          pytest --cov=custom_components/ha_daikin_altherma4_modbus --cov-append --cov-report=xml --cov-report=term-missing --junit-xml=test-results-integration.xml || true

      - name: Run slow tests (if any)
        run: |
          pytest --cov=custom_components/ha_daikin_altherma4_modbus --cov-append --cov-report=xml --cov-report=term-missing --junit-xml=test-results-slow.xml || true

      - name: Run config flow tests (data_description validation)
        run: |
          pytest tests/test_config_flow_data_description.py -v --junit-xml=test-results-config-flow.xml

      - name: Run mock client tests (16-bit validation)
        run: |
          pytest tests/test_mock_client_16bit.py -v --junit-xml=test-results-mock-client.xml

      - name: Run tests with coverage
        run: |
          # First, try to run pytest in discovery mode to see what tests it finds
          pytest --collect-only -v
          
          # If tests are found, run them with coverage
          pytest --cov=custom_components/ha_daikin_altherma4_modbus --cov-report=xml --cov-report=term-missing -v

      # 📊 Coverage Reporting
      - name: Generate coverage reports
        run: |
          coverage xml
          coverage html
          coverage report --show-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report-${{ matrix.ha-version }}
          path: |
            htmlcov/
            coverage.xml
            .coverage

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.ha-version }}
          path: |
            test-results-*.xml

      # 🐳 Test against multiple HA versions
      - name: Test integration load in Home Assistant ${{ matrix.ha-version }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/custom_components:/config/custom_components \
            -v ${{ github.workspace }}/configuration.yaml:/config/configuration.yaml \
            ghcr.io/home-assistant/home-assistant:${{ matrix.ha-version }} \
            python -m homeassistant --script check_config --config /config

      # 📈 Performance Benchmarking
      - name: Run performance benchmarks
        run: |
          pytest --benchmark-only --benchmark-json=benchmark.json || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results-${{ matrix.ha-version }}
          path: benchmark.json

  # 🔍 Additional Code Quality Checks
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    container: python:3.12-alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install bandit pip-audit

      # 🔒 Security Checks
      - name: Run Bandit security linter
        run: bandit -r custom_components/ -f json -o bandit-report.json || true

      - name: Run pip-audit for known vulnerabilities
        run: pip-audit -r requirements-dev.txt -o audit-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            audit-report.json

  # 📋 Test Summary
  test-summary:
    name: Test Summary
    needs: [validate, dev-release, release]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1

      - name: Create test summary
        run: |
          echo "# 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Passed Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Code linting with Ruff" >> $GITHUB_STEP_SUMMARY
          echo "- Code formatting check" >> $GITHUB_STEP_SUMMARY
          echo "- Import sorting check" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests" >> $GITHUB_STEP_SUMMARY
          echo "- Integration tests" >> $GITHUB_STEP_SUMMARY
          echo "- Home Assistant configuration validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Coverage Information" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports and HTML artifacts are available for download." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔍 Security Analysis" >> $GITHUB_STEP_SUMMARY
          echo "Security reports are available for download." >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Release Information" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]] && [[ ! "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "- Development release will be created as \`dev-<version>\`" >> $GITHUB_STEP_SUMMARY
            echo "- Marked as prerelease on GitHub" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "- Stable release will be created from tag" >> $GITHUB_STEP_SUMMARY
            echo "- Production-ready release" >> $GITHUB_STEP_SUMMARY
          else
            echo "- No release (Pull Request)" >> $GITHUB_STEP_SUMMARY
          fi

  dev-release:
    name: Create Development Release
    needs: [validate]
    if: (github.ref == 'refs/heads/dev' && !startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Get version from manifest
      - name: Get manifest version
        id: manifest
        run: |
          VERSION=$(jq -r '.version' custom_components/ha_daikin_altherma4_modbus/manifest.json)
          echo "manifest_version=$VERSION" >> $GITHUB_OUTPUT

      # Create dev release tag and release
      - name: Create Development Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          name: "Development Release ${{ steps.manifest.outputs.manifest_version }}"
          tag_name: "dev-${{ steps.manifest.outputs.manifest_version }}"
          prerelease: true
          generate_release_notes: true
          body: |
            ## Development Release ${{ steps.manifest.outputs.manifest_version }}
            
            This is an automatic development release from the dev branch.
            
            **Warning:** This is a development release and may contain unstable features.
            
            ### Changes
            See the "Changes" section below for automatic commit summary.

  release:
    name: Create Release
    needs: [validate]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
