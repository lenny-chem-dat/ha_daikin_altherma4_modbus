name: Update PR Description

on:
  pull_request:
    types: [opened]

jobs:
  update-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate AI Summary
        id: ai-summary
        run: |
          echo "## 🤖 AI Generated Summary" >> summary.md
          echo "" >> summary.md

          # List changed files
          echo "### 📁 Changed Files" >> summary.md
          git diff --name-only origin/${{ github.base_ref }}...HEAD | sed 's/^/- /' >> summary.md
          echo "" >> summary.md

          # Add commit messages
          echo "### 📝 Recent Commits" >> summary.md
          git log --oneline -5 origin/${{ github.base_ref }}..HEAD | sed 's/^/- /' >> summary.md

          # Set output
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          cat summary.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.ai-summary.outputs.summary }}`;
            const currentBody = context.payload.pull_request.body || '';

            const newBody = summary + '\n\n---\n\n' + currentBody;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: newBody
            });
