[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --tb=short
    --color=yes
    --durations=10
    --strict-config
    --cov=custom_components/ha_daikin_altherma4_modbus
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --junit-xml=test-results.xml
    --html=test-report.html
    --self-contained-html
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    demo_mode: marks tests that require demo mode
    network: marks tests that require network access
    coverage: marks tests that should be included in coverage reporting
    config_flow: marks tests related to config flow functionality
    options_flow: marks tests related to options flow functionality
    setup_entry: marks tests related to async_setup_entry
    unload_entry: marks tests related to async_unload_entry
    benchmark: marks tests for performance benchmarking
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:custom_components.*
